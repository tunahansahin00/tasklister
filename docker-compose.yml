services:
  postgres:
    image: postgres:16-alpine
    container_name: tasklister-db
    environment:
      POSTGRES_DB: tasklister
      POSTGRES_USER: taskuser
      POSTGRES_PASSWORD: taskpass123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
